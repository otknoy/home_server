apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:3.0.0
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /
              port: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
          envFrom:
            - configMapRef:
                name: registry-cm
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          securityContext:
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: nfs-client
        resources:
          requests:
            storage: 32Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ui
  labels:
    app: registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-ui
  template:
    metadata:
      labels:
        app: registry-ui
    spec:
      containers:
        - name: registry-ui
          image: joxit/docker-registry-ui:2.6.0
          ports:
            - containerPort: 80
          env:
            - name: SINGLE_REGISTRY
              value: "true"
            - name: REGISTRY_TITLE
              value: "Docker Registry"
            - name: NGINX_PROXY_PASS_URL
              value: http://registry-service:5000
            - name: REGISTRY_URL
              value: https://my-registry.tailba37e.ts.net

---

apiVersion: v1
kind: Service
metadata:
  name: registry-service
spec:
  selector:
    app: registry
  ports:
    - port: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: registry-ui-service
spec:
  selector:
    app: registry-ui
  ports:
    - port: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry-ingress
  annotations:
    tailscale.com/ingress-class: tailscale
    nginx.ingress.kubernetes.io/proxy-body-size: "0" # イメージのアップロード制限を解除
spec:
  ingressClassName: tailscale
  tls:
  - hosts:
    - my-registry
  rules:
  - host: my-registry
    http:
      paths:
      - path: /v2
        pathType: Prefix
        backend:
          service:
            name: registry-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: registry-ui-service
            port:
              number: 80
